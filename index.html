<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Lizzie</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Initial sunflower button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img.initial {
    max-width: 220px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
}

.title {
    margin-top: 15px;
    font-size: 1.5rem;
    color: #7B3F00;
    letter-spacing: 2px;
}

.line {
    width: 200px;
    height: 2px;
    background-color: #7B3F00;
    margin-top: 8px;
}

/* Seed */
.seed {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #7B3F00;
    border-radius: 50%;
    opacity: 0;
}

/* Ground line */
.ground {
    position: absolute;
    bottom: 80px;
    height: 3px;
    width: 0;
    background-color: black;
}

/* Sunflower field */
.field-flower {
    position: absolute;
    bottom: 80px;
    width: 60px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.8s ease;
}

.field-flower.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>
<div class="center">

    <button class="flower-btn" onclick="plantSeed()">
        <img class="initial" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="title" id="title">Flowers For Lizzie</div>
    <div class="line" id="line"></div>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Sunflower field (50+ flowers) -->
    <!-- Left to right positions spaced evenly -->
    <script>
        const positions = [];
        for (let i = 1; i <= 50; i++) {
            positions.push(i * 2); // percent of width (approx)
        }
        document.write(positions.map(p =>
            `<img class="field-flower" src="https://toppng.com/free-image/sunflower-Png-transparent-with-clear-background-ID-105561.png" style="left:${p}%; transform: translateX(-50%);" />`
        ).join(""));
    </script>

</div>

<script>
function plantSeed() {
    document.querySelector(".flower-btn").classList.add("hidden");
    document.getElementById("title").classList.add("hidden");
    document.getElementById("line").classList.add("hidden");

    const seed = document.getElementById("seed");
    const ground = document.getElementById("ground");

    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    setTimeout(() => {
        ground.style.left = "5%";
        ground.classList.add("animate-ground");
    }, 500);

    setTimeout(() => {
        seed.style.opacity = "0";

        const flowers = document.querySelectorAll(".field-flower");
        flowers.forEach((flower, i) => {
            setTimeout(() => {
                flower.classList.add("show");
            }, i * 80); // stagger bloom
        });
    }, 2000);
}
</script>

</body>
</html>
