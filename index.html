<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Lizzie</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Initial sunflower button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img {
    max-width: 220px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
}

.title {
    margin-top: 15px;
    font-size: 1.5rem;
    color: #7B3F00;
    letter-spacing: 2px;
}

.line {
    width: 200px;
    height: 2px;
    background-color: #7B3F00;
    margin-top: 8px;
}

/* Seed */
.seed {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #7B3F00;
    border-radius: 50%;
    opacity: 0;
}

/* Ground line */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 0;
    background-color: black;
}

/* Sunflowers */
.sunflower {
    position: absolute;
    bottom: 100px;
    width: 60px;
    transform-origin: bottom center;
    opacity: 0;
    transition: all 2s ease;
}
.sunflower.show {
    opacity: 1;
    transform: translateY(-150px); /* grows above ground */
}
</style>
</head>

<body>
<div class="center">

    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="title" id="title">Flowers For Lizzie</div>
    <div class="line" id="line"></div>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Sunflower row -->
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:10%; transform: translateX(-50%);" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:25%; transform: translateX(-50%);" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:40%; transform: translateX(-50%);" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:55%; transform: translateX(-50%);" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:70%; transform: translateX(-50%);" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:85%; transform: translateX(-50%);" />

</div>

<script>
function plantSeed() {
    document.querySelector(".flower-btn").classList.add("hidden");
    document.getElementById("title").classList.add("hidden");
    document.getElementById("line").classList.add("hidden");

    const seed = document.getElementById("seed");
    const ground = document.getElementById("ground");

    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    setTimeout(() => {
        ground.style.left = "5%";
        ground.classList.add("animate-ground");
    }, 500);

    setTimeout(() => {
        seed.style.opacity = "0";

        const flowers = document.querySelectorAll(".sunflower");
        flowers.forEach((flower, i) => {
            setTimeout(() => {
                flower.classList.add("show");
            }, i * 400); // stagger growth
        });
    }, 2200);
}
</script>
</body>
</html>
