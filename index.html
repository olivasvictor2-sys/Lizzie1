<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Lizzie</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Flower button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img {
    max-width: 220px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
}

.title {
    margin-top: 15px;
    font-size: 1.5rem;
    color: #7B3F00;
    letter-spacing: 2px;
}

.line {
    width: 200px;
    height: 2px;
    background-color: #7B3F00;
    margin-top: 8px;
}

/* Seed */
.seed {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #7B3F00;
    border-radius: 50%;
    opacity: 0;
}

/* Ground line */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 0;
    background-color: black;
}

/* SVG tree */
#tree {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    height: 200px;
    opacity: 0;
}
#tree path {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: drawTree 2.5s ease forwards;
}

/* Animations */
@keyframes fall {
    0% { top: 40%; opacity: 1; }
    100% { top: calc(100% - 120px); opacity: 1; }
}

@keyframes growLine {
    0% { width: 0; }
    100% { width: 80%; }
}

@keyframes drawTree {
    from { stroke-dashoffset: 1000; opacity: 1; }
    to { stroke-dashoffset: 0; opacity: 1; }
}

.animate-seed {
    animation: fall 2s ease forwards;
}

.animate-ground {
    animation: growLine 2s ease forwards;
}

.animate-tree {
    opacity: 1;
}

.hidden {
    opacity: 0;
    transition: opacity 0.5s ease;
}
</style>
</head>

<body>
<div class="center">

    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="title" id="title">Flowers For Lizzie</div>
    <div class="line" id="line"></div>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- SVG tree -->
    <svg id="tree" viewBox="0 0 200 300">
        <path d="
            M100 300 
            L100 200 
            
            M100 230 
            C80 210, 70 180, 60 150
            
            M100 220 
            C120 200, 140 170, 150 140
            
            M100 190 
            C85 170, 75 140, 70 110
            
            M100 180 
            C115 160, 135 130, 140 100
            
            M100 150 
            C90 130, 85 100, 90 70
            
            M100 140 
            C110 120, 120 90, 115 60
        "
        stroke="#7B3F00"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"/>
    </svg>

</div>

<script>
function plantSeed() {
    // Hide flower + text
    document.querySelector(".flower-btn").classList.add("hidden");
    document.getElementById("title").classList.add("hidden");
    document.getElementById("line").classList.add("hidden");

    const seed = document.getElementById("seed");
    const ground = document.getElementById("ground");

    // Show seed
    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    // Animate ground line
    setTimeout(() => {
        ground.style.left = "10%";
        ground.classList.add("animate-ground");
    }, 500);

    // Grow tree after seed lands
    setTimeout(() => {
        seed.style.opacity = "0";

        const tree = document.getElementById("tree");
        tree.classList.add("animate-tree");

    }, 2200);
}
</script>
</body>
</html>
