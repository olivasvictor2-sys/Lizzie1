<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Lizzie</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img {
    max-width: 220px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
}

.title {
    margin-top: 15px;
    font-size: 1.5rem;
    color: #7B3F00;
    letter-spacing: 2px;
}

.line {
    width: 200px;
    height: 2px;
    background-color: #7B3F00;
    margin-top: 8px;
}

/* Hide elements */
.hidden {
    opacity: 0;
    transition: opacity 0.5s ease;
}

/* Seed */
.seed {
    position: absolute;
    top: 40%;
    width: 20px;
    height: 20px;
    background-color: #7B3F00;
    border-radius: 50%;
    opacity: 0;
}

/* Seed animation */
.animate-seed {
    animation: dropSeed 1s ease forwards;
}

@keyframes dropSeed {
    0% {
        top: 40%;
    }
    100% {
        top: calc(100% - 110px);
    }
}

/* Ground */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 0;
    background-color: black;
}

/* Ground animation */
.animate-ground {
    animation: growGround 1s ease forwards;
}

@keyframes growGround {
    0% {
        width: 0;
    }
    100% {
        width: 90%;
    }
}

/* Sunflowers */
.sunflower {
    position: absolute;
    bottom: 100px;
    width: 60px;
    transform: translate(-50%, 0);
    opacity: 0;
    transition: all 2s ease;
}

.sunflower.show {
    opacity: 1;
    transform: translate(-50%, -150px);
}
</style>
</head>

<body>
<div class="center">

    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="title" id="title">Flowers For Lizzie</div>
    <div class="line" id="line"></div>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Sunflowers -->
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:10%;" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:25%;" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:40%;" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:55%;" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:70%;" />
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:85%;" />

</div>

<script>
function plantSeed() {
    document.querySelector(".flower-btn").classList.add("hidden");
    document.getElementById("title").classList.add("hidden");
    document.getElementById("line").classList.add("hidden");

    const seed = document.getElementById("seed");
    const ground = document.getElementById("ground");

    // Show and drop seed
    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    // Grow ground
    setTimeout(() => {
        ground.style.left = "5%";
        ground.classList.add("animate-ground");
    }, 500);

    // Grow flowers
    setTimeout(() => {
        seed.style.opacity = "0";

        const flowers = document.querySelectorAll(".sunflower");
        flowers.forEach((flower, i) => {
            setTimeout(() => {
                flower.classList.add("show");
            }, i * 400);
        });
    }, 2000);
}
</script>
</body>
</html>
