<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Lizzie</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Flower button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img {
    max-width: 220px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
}

.title {
    margin-top: 15px;
    font-size: 1.5rem;
    color: #7B3F00;
    letter-spacing: 2px;
}

.line {
    width: 200px;
    height: 2px;
    background-color: #7B3F00;
    margin-top: 8px;
}

/* Seed */
.seed {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #7B3F00;
    border-radius: 50%;
    opacity: 0;
}

/* Ground line */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 0;
    background-color: black;
}

/* Flowers */
.flower {
    position: absolute;
    bottom: 100px;
    width: 40px;
    height: auto;
    opacity: 0;
    transform: translateY(20px) scale(0.5);
    transition: all 1.5s ease;
}
.flower.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* Optional: slight rotation for natural look */
.flower:nth-child(even) {
    transform: rotate(-10deg) scale(0.5);
}
.flower:nth-child(odd) {
    transform: rotate(10deg) scale(0.5);
}
</style>
</head>

<body>
<div class="center">

    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="title" id="title">Flowers For Lizzie</div>
    <div class="line" id="line"></div>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Flowers will appear here -->
    <img class="flower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left: 20%;" alt="Sunflower">
    <img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Tulip_Flower_PNG_Clipart.png/320px-Tulip_Flower_PNG_Clipart.png" style="left: 35%;" alt="Tulip">
    <img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Rose_PNG.png/320px-Rose_PNG.png" style="left: 50%;" alt="Rose">
    <img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Cherry_blossom_PNG_Clipart.png/320px-Cherry_blossom_PNG_Clipart.png" style="left: 65%;" alt="Cherry Blossom">
    <img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Lavender_PNG_Clipart.png/320px-Lavender_PNG_Clipart.png" style="left: 80%;" alt="Lavender">

</div>

<script>
function plantSeed() {
    // Hide flower + text
    document.querySelector(".flower-btn").classList.add("hidden");
    document.getElementById("title").classList.add("hidden");
    document.getElementById("line").classList.add("hidden");

    const seed = document.getElementById("seed");
    const ground = document.getElementById("ground");

    // Show seed and drop it
    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    // Animate ground line
    setTimeout(() => {
        ground.style.left = "10%";
        ground.classList.add("animate-ground");
    }, 500);

    // Show flowers after seed lands
    setTimeout(() => {
        seed.style.opacity = "0";
        const flowers = document.querySelectorAll(".flower");
        flowers.forEach((flower, index) => {
            setTimeout(() => {
                flower.classList.add("show");
            }, index * 500); // stagger growth
        });
    }, 2000);
}
</script>
</body>
</html>
