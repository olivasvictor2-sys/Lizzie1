<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Lizzie</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Flower button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img {
    max-width: 220px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
}

.title {
    margin-top: 15px;
    font-size: 1.5rem;
    color: #7B3F00;
    letter-spacing: 2px;
}

.line {
    width: 200px;
    height: 2px;
    background-color: #7B3F00;
    margin-top: 8px;
}

/* Seed */
.seed {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #7B3F00;
    border-radius: 50%;
    opacity: 0;
}

/* Ground line */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 0;
    background-color: black;
}

/* Sunflower field */
.sunflower {
    position: absolute;
    bottom: 100px;
    width: 60px;
    transform-origin: bottom center;
    opacity: 0;
    transition: all 2s ease;
}

/* Stems */
.stem {
    position: absolute;
    width: 4px;
    background-color: #7B3F00;
    bottom: 100px;
    opacity: 0;
    transition: all 2s ease;
}

/* Seed drop animation */
@keyframes fall {
    0% { top: 40%; opacity: 1; }
    100% { top: calc(100% - 120px); opacity: 1; }
}

/* Ground line animation */
@keyframes growLine {
    0% { width: 0; }
    100% { width: 80%; }
}

.animate-seed {
    animation: fall 2s ease forwards;
}

.animate-ground {
    animation: growLine 2s ease forwards;
}

.show-flower {
    opacity: 1;
    transform: translateY(-150px); /* makes flower rise above ground */
}

.show-stem {
    opacity: 1;
    height: 150px;
}

.hidden {
    opacity: 0;
    transition: opacity 0.5s ease;
}
</style>
</head>

<body>
<div class="center">

    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="title" id="title">Flowers For Lizzie</div>
    <div class="line" id="line"></div>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Sunflower field -->
    <div class="stem" id="stem1" style="left:10%;"></div>
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:10%;" alt="Sunflower">

    <div class="stem" id="stem2" style="left:25%;"></div>
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:25%;" alt="Sunflower">

    <div class="stem" id="stem3" style="left:40%;"></div>
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:40%;" alt="Sunflower">

    <div class="stem" id="stem4" style="left:55%;"></div>
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:55%;" alt="Sunflower">

    <div class="stem" id="stem5" style="left:70%;"></div>
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:70%;" alt="Sunflower">

    <div class="stem" id="stem6" style="left:85%;"></div>
    <img class="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" style="left:85%;" alt="Sunflower">

</div>

<script>
function plantSeed() {
    // Hide initial flower and text
    document.querySelector(".flower-btn").classList.add("hidden");
    document.getElementById("title").classList.add("hidden");
    document.getElementById("line").classList.add("hidden");

    const seed = document.getElementById("seed");
    const ground = document.getElementById("ground");

    // Drop the seed
    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    // Grow ground line
    setTimeout(() => {
        ground.style.left = "10%";
        ground.classList.add("animate-ground");
    }, 500);

    // After seed hits, show sunflowers with stems
    setTimeout(() => {
        seed.style.opacity = "0";

        const flowers = document.querySelectorAll(".sunflower");
        const stems = document.querySelectorAll(".stem");

        flowers.forEach((flower, i) => {
            setTimeout(() => {
                flower.classList.add("show-flower");
                stems[i].classList.add("show-stem");
            }, i * 400); // stagger growth
        });
    }, 2200);
}
</script>
</body>
</html>
