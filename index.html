<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seed to Big Tree with Sunflowers</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

img {
    max-width: 220px;
}

/* Hide elements */
.hidden {
    opacity: 0;
    transition: opacity 0.5s ease;
}

/* Seed (oval) */
.seed {
    position: absolute;
    top: 40%;
    width: 16px;
    height: 24px;
    background-color: #7B3F00;
    border-radius: 50% / 60%;
    opacity: 0;
}

/* Seed drop animation */
.animate-seed {
    animation: dropSeed 1.8s ease-in forwards;
}

@keyframes dropSeed {
    0% { top: 40%; }
    100% { top: calc(100% - 110px); }
}

/* Ground */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 90%;
    background-color: black;
    left: 5%;
}

/* Tree */
.tree {
    position: absolute;
    bottom: 100px; /* start at ground */
    height: 33vh; /* one-third of screen height */
    opacity: 0;
    transform-origin: bottom center; /* grow from bottom */
    transition: all 3s ease;
}

.tree.show {
    opacity: 1;
}

/* Sunflowers */
.sunflower {
    position: absolute;
    opacity: 0;
    transform-origin: center center;
    transition: all 2s ease;
}
.sunflower.show {
    opacity: 1;
}
</style>
</head>
<body>

<div class="center">
    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Big Tree -->
    <img id="tree" class="tree" src="Tree.png" alt="Tree">
</div>

<script>
function plantSeed() {
    const button = document.querySelector(".flower-btn");
    const seed = document.getElementById("seed");
    const tree = document.getElementById("tree");

    // hide button
    button.classList.add("hidden");

    // drop seed
    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    setTimeout(() => {
        seed.style.opacity = "0";

        // show tree
        tree.classList.add("show");

        // add 100 sunflowers randomly on tree
        const treeRect = tree.getBoundingClientRect();
        for (let i = 0; i < 100; i++) {
            const sf = document.createElement("img");
            sf.src = "https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png";
            sf.className = "sunflower";

            // random size 20px to 50px
            const size = 20 + Math.random() * 30;
            sf.style.width = size + "px";

            // random position within tree image
            const x = treeRect.left + Math.random() * treeRect.width;
            const y = treeRect.bottom - Math.random() * treeRect.height; // from bottom up
            sf.style.left = x + "px";
            sf.style.bottom = window.innerHeight - y + "px"; // adjust bottom

            document.body.appendChild(sf);

            // stagger appearance
            setTimeout(() => {
                sf.classList.add("show");
            }, i * 30);
        }
    }, 1800); // after seed drop
}
</script>

</body>
</html>
