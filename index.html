<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seed to Big Tree with Sunflowers</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #DCC5A0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.center {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Button */
.flower-btn {
    border: none;
    background: none;
    cursor: pointer;
}

/* Seed */
.seed {
    position: absolute;
    top: 40%;
    width: 16px;
    height: 24px;
    background-color: #7B3F00;
    border-radius: 50% / 60%;
    opacity: 0;
}

/* Seed drop animation */
.animate-seed {
    animation: dropSeed 1.8s ease-in forwards;
}

@keyframes dropSeed {
    0% { top: 40%; }
    100% { top: calc(100% - 110px); }
}

/* Ground */
.ground {
    position: absolute;
    bottom: 100px;
    height: 3px;
    width: 0;
    background-color: black;
    left: 5%;
    transition: width 1s ease;
}

/* Tree */
.tree {
    position: absolute;
    bottom: 100px;
    left: 50%;
    width: 0;
    height: 0;
    opacity: 0;
    transform-origin: bottom center;
    transition: all 3s ease;
}

.tree.show {
    width: 500%; /* 5x original width */
    height: 500%; /* 5x original height */
    opacity: 1;
}

/* Sunflowers */
.sunflower {
    position: absolute;
    opacity: 0;
    transform-origin: center center;
    transition: all 2s ease;
}

.sunflower.show {
    opacity: 1;
}
</style>
</head>
<body>

<div class="center">
    <button class="flower-btn" onclick="plantSeed()">
        <img src="https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png" alt="Sunflower">
    </button>

    <div class="seed" id="seed"></div>
    <div class="ground" id="ground"></div>

    <!-- Big Tree -->
    <img id="tree" class="tree" src="Tree.png" alt="Tree">
</div>

<script>
function plantSeed() {
    const button = document.querySelector(".flower-btn");
    const seed = document.getElementById("seed");
    const tree = document.getElementById("tree");
    const ground = document.getElementById("ground");

    button.classList.add("hidden");

    // drop seed
    seed.style.opacity = "1";
    seed.style.left = "50%";
    seed.style.transform = "translateX(-50%)";
    seed.classList.add("animate-seed");

    // grow ground line
    ground.style.width = "90%";

    setTimeout(() => {
        seed.style.opacity = "0";

        // show big tree
        tree.classList.add("show");

        // Define sunflowers over tree branches
        const sunflowerPositions = [
            {x: -100, y: -50, scale: 0.5},
            {x: 0, y: -80, scale: 0.6},
            {x: 120, y: -60, scale: 0.4},
            {x: -80, y: -120, scale: 0.7},
            {x: 60, y: -150, scale: 0.5},
            // ... add more coordinates here over branches
        ];

        sunflowerPositions.forEach((pos, i) => {
            const sf = document.createElement("img");
            sf.src = "https://pngimg.com/uploads/sunflower/sunflower_PNG13409.png";
            sf.className = "sunflower";
            sf.style.left = `calc(50% + ${pos.x}px)`; // relative to tree center
            sf.style.bottom = `${100 + pos.y}px`; // relative to ground
            sf.style.width = `${50 * pos.scale}px`; // scale size

            document.body.appendChild(sf);

            setTimeout(() => {
                sf.classList.add("show");
            }, i * 100); // staggered appearance
        });

    }, 1800); // seed drop duration
}
</script>

</body>
</html>
